ColvarsTrajFrequency 400
ColvarsRestartFrequency 400

scriptedColvarForces on

colvar {
  name phi
  dihedral {
    group1 {atomNumbers {5}}
    group2 {atomNumbers {7}}
    group3 {atomNumbers {9}}
    group4 {atomNumbers {15}}
  }
}

colvar {
  name psi
  dihedral {
    group1 {atomNumbers {7}}
    group2 {atomNumbers {9}}
    group3 {atomNumbers {15}}
    group4 {atomNumbers {17}}
  }
}


harmonicWalls {
 name harmonicWall_phi
 colvars phi
 lowerWalls -175.0
 upperWalls  175.0
 lowerWallConstant 2.0
 upperWallConstant 2.0
}

harmonicWalls {
 name harmonicWall_psi
 colvars psi
 lowerWalls -175.0
 upperWalls  175.0
 lowerWallConstant 2.0
 upperWallConstant 2.0
}


